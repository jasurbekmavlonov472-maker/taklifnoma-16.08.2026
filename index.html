<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasurbek & Zaxro</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(#f5efe6, #efe6d8);
  text-align: center;
  color: #4b3f35;
}

.container {
  padding: 50px 20px;
  max-width: 600px;
  margin: auto;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  margin-bottom: 10px;
  animation: fadeIn 2s ease-in-out;
}

.date {
  font-size: 20px;
  margin-bottom: 30px;
}

.section {
  margin-top: 40px;
  animation: fadeUp 2s ease;
}

.map-btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 25px;
  background: #d8c3a5;
  text-decoration: none;
  color: #000;
  transition: 0.3s;
}

.map-btn:hover {
  background: #c5aa85;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(-20px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Jasurbek & Zaxro</h1>
<p class="date">16 Avgust 2026</p>

<div class="section">
<h2>Assalomu alaykum!</h2>
<p>Sizni nikoh to‘yimizga taklif qilamiz.</p>
</div>

<div class="section">
<p>
📍 Qashqadaryo viloyati<br>
Shahrisabz shahri<br>
"OQSHOM" restorani
</p>

<a class="map-btn" href="https://maps.google.com?q=Shahrisabz Oqshom restorani" target="_blank">
📍 Xaritani ochish
</a>
</div>

<div class="section">
<p>Sizning tashrifingiz biz uchun katta sharaf!</p>
</div>

</div>

</body>
</html>
